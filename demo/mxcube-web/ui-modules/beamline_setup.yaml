---

beamline_setup:
  id: beamline_setup
  components:
    - label: Beamstop
      attribute: diffractometer.beamstop
    - label: Capillary
      attribute: diffractometer.capillary
    - label: Fast Shutter
      attribute: fast_shutter
    - label: Safety shutter
      attribute: safety_shutter
    - label: Detector
      attribute: detector
    - label: Energy
      attribute: energy
      step: 0.001
      precision: 4
      suffix: keV
    - label: Resolution
      attribute: resolution
      step: 0.001
      precision: 3
      suffix: Å
    - label: Transmission
      attribute: transmission
      step: 0.1
      precision: 1
      suffix: "%"
    - label: Cryo
      attribute: cryo
      precision: 2
      suffix: k
    - label: Wavelength
      attribute: energy.wavelength
      step: 0.01
      precision: 2
      suffix: Å
    - label: Detector Distance
      attribute: detector.detector_distance
      step: 0.1
      precision: 1
      suffix: mm
    - label: Flux
      attribute: flux
      precision: 2
      suffix: ph/s
      format: expo
